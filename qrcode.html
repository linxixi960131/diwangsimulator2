<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>帝王模拟器2 - 手机访问二维码</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        
        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #FFD700, #D4AF37);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        
        #qrcode {
            background: white;
            padding: 20px;
            border-radius: 15px;
            margin: 20px auto;
            width: fit-content;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        
        .url-display {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.85rem;
            color: #FFD700;
        }
        
        .instructions {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            text-align: left;
        }
        
        .instructions h3 {
            color: #FFD700;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        
        .instructions ol {
            padding-left: 20px;
            color: #ccc;
            font-size: 0.9rem;
            line-height: 1.6;
        }
        
        .instructions li {
            margin-bottom: 5px;
        }
        
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #8B0000, #A52A2A);
            color: #FFD700;
            border: 2px solid #D4AF37;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.5);
        }
        
        .loading {
            color: #FFD700;
            font-size: 0.9rem;
            margin-top: 20px;
        }
        
        @media (max-width: 480px) {
            h1 {
                font-size: 1.5rem;
            }
            
            .instructions {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>帝王模拟器2</h1>
        <p class="subtitle">iOS 手机访问二维码</p>
        
        <div id="qrcode">
            <div class="loading">正在生成二维码...</div>
        </div>
        
        <div class="url-display" id="url-display">
            正在获取访问地址...
        </div>
        
        <div class="instructions">
            <h3>📱 iOS 访问步骤</h3>
            <ol>
                <li>确保 iPhone 和电脑在同一 WiFi 网络</li>
                <li>使用 iPhone 相机扫描二维码</li>
                <li>点击弹出的通知打开 Safari</li>
                <li>游戏加载后，点击"分享"按钮</li>
                <li>选择"添加到主屏幕"便于下次访问</li>
            </ol>
        </div>
        
        <a href="/" class="btn">返回游戏</a>
    </div>
    
    <!-- 二维码生成库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        // 获取当前访问地址
        const currentUrl = window.location.origin;
        const gameUrl = currentUrl;
        
        // 显示 URL
        document.getElementById('url-display').textContent = gameUrl;
        
        // 生成二维码
        function generateQRCode() {
            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';
            
            try {
                new QRCode(qrcodeContainer, {
                    text: gameUrl,
                    width: 200,
                    height: 200,
                    colorDark: '#8B0000',
                    colorLight: '#ffffff',
                    correctLevel: QRCode.CorrectLevel.H
                });
            } catch (error) {
                console.error('二维码生成失败:', error);
                qrcodeContainer.innerHTML = '<div style="color: #ff6b6b; padding: 20px;">二维码生成失败，请手动输入地址</div>';
            }
        }
        
        // 等待 QRCode 库加载完成
        if (typeof QRCode !== 'undefined') {
            generateQRCode();
        } else {
            window.addEventListener('load', generateQRCode);
        }
        
        // 3秒后重试（以防库加载延迟）
        setTimeout(() => {
            if (document.getElementById('qrcode').querySelector('.loading')) {
                generateQRCode();
            }
        }, 3000);
    </script>
</body>
</html>
