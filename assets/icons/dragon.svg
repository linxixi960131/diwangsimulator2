<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <linearGradient id="red" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#DC143C"/>
      <stop offset="100%" style="stop-color:#8B0000"/>
    </linearGradient>
  </defs>
  
  <!-- 龙身 -->
  <path d="M20,50 Q30,30 50,35 Q70,40 75,50 Q70,60 50,65 Q30,70 20,50" 
        fill="url(#red)" stroke="url(#gold)" stroke-width="2"/>
  
  <!-- 龙头 -->
  <ellipse cx="75" cy="50" rx="15" ry="12" fill="url(#red)" stroke="url(#gold)" stroke-width="2"/>
  
  <!-- 龙眼 -->
  <circle cx="80" cy="47" r="3" fill="#FFD700"/>
  <circle cx="82" cy="47" r="1" fill="#000"/>
  
  <!-- 龙角 -->
  <path d="M78,40 L75,30 L82,40" fill="url(#gold)" stroke="#B8860B" stroke-width="1"/>
  <path d="M85,42 L88,32 L90,43" fill="url(#gold)" stroke="#B8860B" stroke-width="1"/>
  
  <!-- 龙须 -->
  <path d="M88,52 Q95,55 92,60" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  <path d="M88,50 Q94,48 93,45" fill="none" stroke="#FFD700" stroke-width="1.5"/>
  
  <!-- 龙鳞装饰 -->
  <circle cx="35" cy="45" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="45" cy="55" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="55" cy="45" r="3" fill="url(#gold)" opacity="0.6"/>
  <circle cx="65" cy="55" r="3" fill="url(#gold)" opacity="0.6"/>
</svg>